services:
  - type: web
    name: qrcode-lab
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: FIREBASE_DATABASE_ID
        value: qrcodelab
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
